name : Postman Collection Workflow

on: 
  push: 
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: 30 02 * * * # 8 am IST
    #- cron: 00 14 * * * #7:30 pm IST
    #- cron: 00 06 * * 1-5 #11:30 am IST

jobs:
    run-postman-tests:
      runs-on: ubuntu-latest

      steps:
        - name: checkout the code
          uses: actions/checkout@v6.0.2

        - name: Install Nodejs and npm
          uses: actions/setup-node@v6.3.0
          with:
            node-version: '22'

        - name: Install Newman and Html-extra globally
          run: |
              npm install -g newman
              npm install -g newman-reporter-htmlextra

        - name: Run the Postman Collection with newman
          run: |
               newman run 'Inwarranty-flow collection Copy.postman_collection.json' \
               -e QA.postman_environment.json \
               -d testdata.csv \
               -r cli,htmlextra \
               --reporter-htmlextra-export ./newman/index.html

        - name: Newman Report
          if: always()  # ensures that the archive executed irrespective whether the previous step has passed or not 
          uses: actions/upload-artifact@v7.0.1
          with:
            name: Newman Report
            path: newman/*.html

        - name: Creating GitHub page branch
          if: always()
          uses: peaceiris/actions-gh-pages@v4.0.0
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: newman/
               













          
